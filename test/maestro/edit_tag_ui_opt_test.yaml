appId: com.senyepss.corianderPlayer
---
# 测试编辑标签页面 UI 优化
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "音乐库"

# 长按第一首歌打开上下文菜单
- longPressOn:
    id: "audio_tile_0"
- waitForAnimationToEnd:
    timeout: 1000

# 点击编辑标签
- tapOn: "编辑标签"
- waitForAnimationToEnd:
    timeout: 2000

# 截图查看编辑标签页面
- takeScreenshot: test/reports/screenshots/edit-tag-ui-opt-01-layout

# 验证页面元素
- assertVisible: "编辑标签"
- assertVisible: "标题"
- assertVisible: "艺术家"
- assertVisible: "专辑"
- assertVisible: "在线搜索"

# 点击封面查看大图（如果有封面）
- tapOn:
    id: "cover_image"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: test/reports/screenshots/edit-tag-ui-opt-02-cover-preview
- tapOn:
    point: "50%,50%"
    optional: true
- waitForAnimationToEnd:
    timeout: 500

# 点击在线搜索
- tapOn: "在线搜索"
- waitForAnimationToEnd:
    timeout: 3000

# 截图查看搜索结果
- takeScreenshot: test/reports/screenshots/edit-tag-ui-opt-03-search-results
