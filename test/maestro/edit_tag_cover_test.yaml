appId: com.senyepss.corianderPlayer
---
# 测试封面点击查看大图功能
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "音乐库"

# 长按第一首歌打开上下文菜单
- longPressOn:
    id: "audio_tile_0"
- waitForAnimationToEnd:
    timeout: 1000

# 点击编辑标签
- tapOn: "编辑标签"
- waitForAnimationToEnd:
    timeout: 2000

# 截图编辑标签页面
- takeScreenshot: test/reports/screenshots/edit-tag-cover-01-page

# 点击封面查看大图
- tapOn:
    id: "cover_image"
- waitForAnimationToEnd:
    timeout: 1000

# 截图大图预览
- takeScreenshot: test/reports/screenshots/edit-tag-cover-02-preview

# 点击关闭大图
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd:
    timeout: 500

# 截图返回后
- takeScreenshot: test/reports/screenshots/edit-tag-cover-03-back
